<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Register')}">
</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <h1 class="auth-title">
            Create Account
        </h1>

        <p class="auth-subtitle">
            Start managing products
        </p>

        <form
                th:action="@{/register}"
                th:object="${user}"
                method="post">

            <div class="form-group">

                <label>Name</label>

                <input
                        type="text"
                        th:field="*{name}"
                        class="form-control"
                        required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                        type="email"
                        th:field="*{email}"
                        class="form-control"
                        required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                        type="password"
                        th:field="*{password}"
                        class="form-control"
                        required>

            </div>

            <button
                    type="submit"
                    class="btn"
                    style="width:100%;">

                Register

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a th:href="@{/login}">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
