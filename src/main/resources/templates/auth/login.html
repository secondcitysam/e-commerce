<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Login')}">
</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <h1 class="auth-title">
            Welcome Back
        </h1>

        <p class="auth-subtitle">
            Sign in to continue
        </p>

        <div
                th:if="${param.error}"
                style="color:red; margin-bottom:15px;">

            Invalid email or password

        </div>

        <div
                th:if="${param.logout}"
                style="color:green; margin-bottom:15px;">

            Successfully logged out

        </div>

        <form
                th:action="@{/perform-login}"
                method="post">

            <div class="form-group">

                <label>Email</label>

                <input
                        type="email"
                        name="username"
                        class="form-control"
                        required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

            </div>

            <button
                    type="submit"
                    class="btn"
                    style="width:100%;">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a th:href="@{/register}">
                Register
            </a>

        </div>

    </div>

</div>

</body>
</html>
